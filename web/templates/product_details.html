{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-6">
            <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 400px;">
                Image Placeholder
            </div>
        </div>
        <div class="col-md-6">
            <h1 class="fw-bold">{{ product.name }}</h1>
            <h3 class="text-success">${{ "{:.2f}".format(product.price) }}</h3>
            <hr>
            <p class="lead text-muted">{{ product.description }}</p>
            
            <div class="mt-4">
                <button class="btn btn-primary btn-lg">Add to Cart</button>
                <a href="/products-catalog" class="btn btn-outline-secondary btn-lg">Back to Catalog</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
