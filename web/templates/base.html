<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
    /* הופך את ה-body למכל גמיש כדי שהפוטר יידחף תמיד למטה */
    body { 
        background-color: #f8f9fa; 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column; 
        margin: 0;
    }

    .navbar-brand { 
        font-weight: 800; 
        letter-spacing: 1px; 
    }

    .nav-link { 
        font-weight: 500; 
        transition: color 0.3s; 
    }

    .nav-link:hover { 
        color: #ffc107 !important; 
    }

    /* תיקון הפוטר - שימוש במאפייני CSS תקניים */
    .footer { 
        margin-top: auto; /* דוחף את הפוטר לתחתית העמוד */
        padding: 1rem 0; /* מרווח פנימי (במקום py-3) */
        background-color: #212529; 
        color: white; 
        text-align: center; 
    }

    .main-content { 
        flex: 1; /* גורם לתוכן המרכזי לתפוס את כל השטח הפנוי */
    }
</style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand text-primary" href="/">
                <i class="bi bi-cart4"></i> Online Store Project
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products-catalog"><i class="bi bi-box-seam"></i> Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/manage-users"><i class="bi bi-people"></i> Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/business-queries"><i class="bi bi-graph-up-arrow"></i> Analysis</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="/docs" class="btn btn-outline-info btn-sm mt-1" target="_blank">
                            <i class="bi bi-file-earmark-code"></i> API Docs
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content container mt-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-5 py-4">
        <div class="container">
            <span class="text-muted">© 2026 Store Management Project | Built with FastAPI & SQLAlchemy</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
